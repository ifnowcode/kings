<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>👑 Kings (Checkers)</title>
  <style>
    body {
      background: #222;
      display: flex;
      justify-content: center;
      align-items: center;
      /*height: 100vh;*/
      margin: 0;
      color: #eee;
      font-family: sans-serif;
    }
    #controls {
      display: flex;
      align-items: center;
      gap: 10px;
      font-family: sans-serif;
      font-size: 16px;
    }
    #difficulty {
      padding: 4px 6px;
      font-size: 16px;
    }
    #container {
      display: flex;
      flex-direction: column;
      gap: 10px;
      width: 100%;
      max-width: 600px; /* optional */
      margin: 0 auto;
    }
    #board-wrapper {
      width: 90%;
      aspect-ratio: 1 / 1; /* keeps board square */
      /*flex-shrink: 0;*/
    }
    #board {
      width: 100%;
      height: 100%;
      display: block;
    }
  </style>
</head>
<body>
  <div id="container">
    <div id="board-wrapper">
      <canvas id="board"></canvas>
    </div>
    <div id="controls">
      <button id="restartBtn">Restart</button>
      <label for="difficulty">Difficulty:</label>
      <select id="difficultySelect">
        <option value="0">0</option>
        <option value="1">1</option>
        <option value="2">2</option>
        <option value="3">3</option>
      </select>
      <span>Player is Black</span>
    </div>
  </div>
  <script src='checkers.js'></script>
</body>
</html>
